<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alina AI - Asisten Pintar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        alina: '#6366f1',
                        alinaDark: '#4f46e5',
                        sidebar: '#f8fafc',
                        sidebarDark: '#1e293b'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .scrollbar-thin::-webkit-scrollbar {
                width: 6px;
            }
            .scrollbar-thin::-webkit-scrollbar-track {
                background: transparent;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: #d1d5db;
                border-radius: 3px;
            }
            .dark .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: #4b5563;
            }
            /* Gaya untuk format teks */
            .prose strong { font-weight: 700; }
            .prose em { font-style: italic; }
            .prose code {
                background: #f1f5f9;
                padding: 2px 6px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.9em;
            }
            .dark .prose code { background: #334155; }
            .prose pre {
                background: #f1f5f9;
                padding: 10px;
                border-radius: 6px;
                overflow-x: auto;
                margin: 8px 0;
            }
            .dark .prose pre { background: #334155; }
            .prose ul, .prose ol { padding-left: 20px; margin: 8px 0; }
            .prose blockquote {
                border-left: 3px solid #94a3b8;
                padding-left: 10px;
                color: #64748b;
                margin: 8px 0;
            }
            .dark .prose blockquote { border-color: #475569; color: #94a3b8; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-inter">

<div id="app" class="flex h-screen max-w-7xl mx-auto shadow-lg">

    <aside class="w-72 bg-sidebar dark:bg-sidebarDark border-r border-gray-200 dark:border-gray-700 flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden">
                    <img src="/static/assets/logo.png" alt="Logo Alina" class="w-full h-full object-contain">
                </div>
                <h2 class="text-lg font-bold">Alina AI</h2>
            </div>

            <button id="obrolanBaru" class="w-full bg-alina hover:bg-alinaDark text-white rounded-lg py-2 px-3 flex items-center justify-center gap-2">
                <i class="fa fa-plus"></i> AI-nya Orang Indonesia
            </button>
        </div>

        <div class="flex-1 p-3 overflow-y-auto scrollbar-thin">
            <h3 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Riwayat Obrolan</h3>
            <div id="daftarRiwayat" class="space-y-1">
            </div>
        </div>

        <div class="p-3 border-t border-gray-200 dark:border-gray-700">
            <button id="modeToggle" class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                <span><i class="fa fa-moon-o dark:hidden mr-2"></i><i class="fa fa-sun-o hidden dark:inline mr-2"></i> Mode Gelap</span>
                <i class="fa fa-chevron-right text-xs"></i>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex justify-between items-center">
            <h1 id="judulObrolan" class="text-xl font-bold">AI-nya Orang Indonesia</h1>
        </header>

        <div id="chatArea" class="flex-1 p-4 overflow-y-auto scrollbar-thin space-y-4 bg-gray-50 dark:bg-gray-900">
            <div class="flex gap-3 max-w-[90%]">
                <div class="w-8 h-8 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden flex-shrink-0 mt-1">
                    <img src="/static/assets/karakter.png" alt="Alina" class="w-full h-full object-contain">
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm prose">
                    <p>Halo! Saya Alina AI. Ada yang bisa saya bantu hari ini?</p>
                </div>
            </div>
        </div>

        <form id="chatForm" class="p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
            <div class="flex gap-2">
                <input type="text" id="pesanInput" placeholder="Ketik pesan Anda..." required
                    class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-full bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-alina">
                <button type="submit" class="w-10 h-10 rounded-full bg-alina hover:bg-alinaDark text-white flex items-center justify-center">
                    <i class="fa fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </main>

</div>

<script>
    const API_DASAR = "/api";
    let percakapanAktifId = null;

    const modeToggle = document.getElementById('modeToggle');
    if (localStorage.getItem('mode') === 'gelap' || 
        (!localStorage.getItem('mode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
    modeToggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('mode', document.documentElement.classList.contains('dark') ? 'gelap' : 'terang');
    });

    function dapatkanSemuaRiwayat() {
        return JSON.parse(localStorage.getItem('riwayatObrolan')) || [];
    }

    function simpanSemuaRiwayat(daftar) {
        localStorage.setItem('riwayatObrolan', JSON.stringify(daftar));
    }

    function buatObrolanBaru(judul = "Obrolan Baru") {
        const id = Date.now().toString();
        const obrolan = {
            id,
            judul,
            pesan: [
                { pengirim: "alina", teks: "Halo! Saya Alina AI. Ada yang bisa saya bantu hari ini?" }
            ],
            dibuatPada: new Date().toISOString()
        };
        const daftar = dapatkanSemuaRiwayat();
        daftar.unshift(obrolan);
        simpanSemuaRiwayat(daftar);
        percakapanAktifId = id;
        renderRiwayat();
        tampilkanIsiObrolan(id);
    }

    function tampilkanIsiObrolan(id) {
        const daftar = dapatkanSemuaRiwayat();
        const obrolan = daftar.find(o => o.id === id);
        if (!obrolan) return;

        percakapanAktifId = id;
        document.getElementById('judulObrolan').textContent = obrolan.judul;
        chatArea.innerHTML = "";

        obrolan.pesan.forEach(item => {
            tambahPesanKeLayar(item.teks, item.pengirim, false);
        });
    }

    function simpanPesanKeObrolan(teks, pengirim) {
        if (!percakapanAktifId) buatObrolanBaru();
        const daftar = dapatkanSemuaRiwayat();
        const index = daftar.findIndex(o => o.id === percakapanAktifId);
        if (index === -1) return;

        daftar[index].pesan.push({ pengirim, teks });
        if (daftar[index].pesan.length === 2 && pengirim === "pengguna") {
            daftar[index].judul = teks.slice(0, 25) + (teks.length > 25 ? "..." : "");
            document.getElementById('judulObrolan').textContent = daftar[index].judul;
        }
        simpanSemuaRiwayat(daftar);
        renderRiwayat();
    }

    function hapusObrolan(id) {
        const daftar = dapatkanSemuaRiwayat().filter(o => o.id !== id);
        simpanSemuaRiwayat(daftar);
        if (percakapanAktifId === id) buatObrolanBaru();
        else renderRiwayat();
    }

    function gantiNamaObrolan(id) {
        const daftar = dapatkanSemuaRiwayat();
        const obrolan = daftar.find(o => o.id === id);
        if (!obrolan) return;
        const namaBaru = prompt("Masukkan nama baru:", obrolan.judul);
        if (namaBaru && namaBaru.trim() !== "") {
            obrolan.judul = namaBaru.trim();
            simpanSemuaRiwayat(daftar);
            if (percakapanAktifId === id) document.getElementById('judulObrolan').textContent = obrolan.judul;
            renderRiwayat();
        }
    }

    function renderRiwayat() {
        const daftarEl = document.getElementById('daftarRiwayat');
        const daftar = dapatkanSemuaRiwayat();
        daftarEl.innerHTML = "";

        if (daftar.length === 0) {
            daftarEl.innerHTML = `<div class="text-xs text-gray-400 text-center py-4">Belum ada riwayat</div>`;
            return;
        }

        daftar.forEach(obrolan => {
            const el = document.createElement('div');
            el.className = `p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer text-sm group flex justify-between items-center ${
                percakapanAktifId === obrolan.id ? 'bg-alina/10 text-alina dark:bg-alina/20' : 'bg-white dark:bg-gray-800'
            }`;
            el.innerHTML = `
                <span class="truncate flex-1" onclick="tampilkanIsiObrolan('${obrolan.id}')">
                    <i class="fa fa-comment-o mr-2"></i> ${obrolan.judul}
                </span>
                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="gantiNamaObrolan('${obrolan.id}')" class="text-gray-500 hover:text-alina px-1">
                        <i class="fa fa-pencil"></i>
                    </button>
                    <button onclick="hapusObrolan('${obrolan.id}')" class="text-gray-500 hover:text-red-500 px-1">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>
            `;
            daftarEl.appendChild(el);
        });
    }

    function formatTeksMarkdown(teks) {
        return teks
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/`(.*?)`/g, '<code>$1</code>')
            .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/^- (.*)$/gm, '<li>$1</li>')
            .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
            .replace(/^> (.*)$/gm, '<blockquote>$1</blockquote>')
            .replace(/\n/g, '<br>');
    }

    function tambahPesanKeLayar(teks, pengirim, simpan = true) {
        const div = document.createElement('div');
        div.className = `flex gap-3 max-w-[90%] ${pengirim === 'pengguna' ? 'ml-auto flex-row-reverse' : ''}`;
        
        if (pengirim === 'alina') {
            const teksTerformat = formatTeksMarkdown(teks);
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden flex-shrink-0 mt-1">
                    <img src="/static/assets/karakter.png" alt="Alina" class="w-full h-full object-contain">
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm prose max-w-none">
                    ${teksTerformat}
                </div>
            `;
        } else {
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-white flex-shrink-0 mt-1">
                    <i class="fa fa-user"></i>
                </div>
                <div class="bg-alina text-white rounded-2xl rounded-tr-none p-3 shadow-sm">
                    <p>${teks.replace(/\n/g, '<br>')}</p>
                </div>
            `;
        }

        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        if (simpan) simpanPesanKeObrolan(teks, pengirim);
    }

    const chatArea = document.getElementById('chatArea');
    const chatForm = document.getElementById('chatForm');
    const pesanInput = document.getElementById('pesanInput');
    const tombolObrolanBaru = document.getElementById('obrolanBaru');

    tombolObrolanBaru.addEventListener('click', () => buatObrolanBaru());

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const teks = pesanInput.value.trim();
        if (!teks) return;

        tambahPesanKeLayar(teks, 'pengguna');
        pesanInput.value = '';

        tambahPesanKeLayar('Sedang mengetik...', 'alina');

        try {
            const res = await fetch(`${API_DASAR}/tanya`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: teks })
            });

            chatArea.removeChild(chatArea.lastChild);

            if (res.ok) {
                const data = await res.json();
                tambahPesanKeLayar(data.jawaban, 'alina');
            } else {
                tambahPesanKeLayar('Maaf, terjadi kesalahan saat memproses permintaan.', 'alina');
            }
        } catch (err) {
            chatArea.removeChild(chatArea.lastChild);
            tambahPesanKeLayar('Tidak dapat terhubung ke server. Silakan coba lagi nanti.', 'alina');
            console.error(err);
        }
    });

    if (dapatkanSemuaRiwayat().length === 0) {
        buatObrolanBaru();
    } else {
        renderRiwayat();
        tampilkanIsiObrolan(dapatkanSemuaRiwayat()[0].id);
    }
</script>
</body>
</html>
