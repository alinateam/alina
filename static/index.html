<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alina AI - Asisten Pintar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        alina: '#6366f1',
                        alinaDark: '#4f46e5',
                        sidebar: '#f8fafc',
                        sidebarDark: '#1e293b'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .scrollbar-thin::-webkit-scrollbar {
                width: 6px;
            }
            .scrollbar-thin::-webkit-scrollbar-track {
                background: transparent;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: #d1d5db;
                border-radius: 3px;
            }
            .dark .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: #4b5563;
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-inter">

<div id="app" class="flex h-screen max-w-7xl mx-auto shadow-lg">

    <aside class="w-72 bg-sidebar dark:bg-sidebarDark border-r border-gray-200 dark:border-gray-700 flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden">
                    <img src="/static/assets/logo.png" alt="Logo Alina" class="w-full h-full object-contain">
                </div>
                <h2 class="text-lg font-bold">Alina AI</h2>
            </div>

            <div class="mb-6 flex flex-col items-center">
                <img src="/static/assets/karakter.png" alt="Karakter Alina" class="w-32 h-auto rounded-xl shadow-md">
                <p class="text-xs text-center text-gray-500 dark:text-gray-300 mt-2">Asisten cerdas siap membantu Anda</p>
            </div>

            <button id="obrolanBaru" class="w-full bg-alina hover:bg-alinaDark text-white rounded-lg py-2 px-3 flex items-center justify-center gap-2">
                <i class="fa fa-plus"></i> Obrolan Baru
            </button>
        </div>

        <div class="flex-1 p-3 overflow-y-auto scrollbar-thin">
            <h3 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Riwayat Obrolan</h3>
            <div id="daftarRiwayat" class="space-y-1">
                <div class="p-2 rounded-lg bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer text-sm">
                    <i class="fa fa-comment-o mr-2"></i> Percakapan terbaru
                </div>
            </div>
        </div>

        <div class="p-3 border-t border-gray-200 dark:border-gray-700">
            <button id="modeToggle" class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                <span><i class="fa fa-moon-o dark:hidden mr-2"></i><i class="fa fa-sun-o hidden dark:inline mr-2"></i> Mode Gelap</span>
                <i class="fa fa-chevron-right text-xs"></i>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">💬 Obrolan dengan Alina AI</h1>
        </header>

        <div id="chatArea" class="flex-1 p-4 overflow-y-auto scrollbar-thin space-y-4 bg-gray-50 dark:bg-gray-900">
            <div class="flex gap-3 max-w-[90%]">
                <div class="w-8 h-8 rounded-full bg-alina flex items-center justify-center text-white flex-shrink-0 mt-1">
                    <i class="fa fa-robot"></i>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm">
                    <p>Halo! Saya Alina AI. Ada yang bisa saya bantu hari ini?</p>
                </div>
            </div>
        </div>

        <form id="chatForm" class="p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
            <div class="flex gap-2">
                <input type="text" id="pesanInput" placeholder="Ketik pesan Anda..." required
                    class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-full bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-alina">
                <button type="submit" class="w-10 h-10 rounded-full bg-alina hover:bg-alinaDark text-white flex items-center justify-center">
                    <i class="fa fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </main>

</div>

<script>
    const API_DASAR = "/api";

    const modeToggle = document.getElementById('modeToggle');
    if (localStorage.getItem('mode') === 'gelap' || 
        (!localStorage.getItem('mode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
    modeToggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('mode', document.documentElement.classList.contains('dark') ? 'gelap' : 'terang');
    });

    const chatArea = document.getElementById('chatArea');
    const chatForm = document.getElementById('chatForm');
    const pesanInput = document.getElementById('pesanInput');
    const tombolObrolanBaru = document.getElementById('obrolanBaru');

    tombolObrolanBaru.addEventListener('click', () => {
        chatArea.innerHTML = `
            <div class="flex gap-3 max-w-[90%]">
                <div class="w-8 h-8 rounded-full bg-alina flex items-center justify-center text-white flex-shrink-0 mt-1">
                    <i class="fa fa-robot"></i>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm">
                    <p>Halo! Saya Alina AI. Ada yang bisa saya bantu hari ini?</p>
                </div>
            </div>
        `;
    });

    function tambahPesan(teks, pengirim = 'pengguna') {
        const div = document.createElement('div');
        div.className = `flex gap-3 max-w-[90%] ${pengirim === 'pengguna' ? 'ml-auto flex-row-reverse' : ''}`;
        
        div.innerHTML = `
            <div class="w-8 h-8 rounded-full ${pengirim === 'pengguna' ? 'bg-gray-700' : 'bg-alina'} flex items-center justify-center text-white flex-shrink-0 mt-1">
                <i class="fa ${pengirim === 'pengguna' ? 'fa-user' : 'fa-robot'}"></i>
            </div>
            <div class="${pengirim === 'pengguna' ? 'bg-alina text-white rounded-tr-none' : 'bg-white dark:bg-gray-800 rounded-tl-none'} rounded-2xl p-3 shadow-sm">
                <p>${teks.replace(/\n/g, '<br>')}</p>
            </div>
        `;

        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const teks = pesanInput.value.trim();
        if (!teks) return;

        tambahPesan(teks, 'pengguna');
        pesanInput.value = '';

        tambahPesan('Sedang mengetik...', 'alina');

        try {
            const res = await fetch(`${API_DASAR}/tanya`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: teks })
            });

            chatArea.removeChild(chatArea.lastChild);

            if (res.ok) {
                const data = await res.json();
                tambahPesan(data.jawaban, 'alina');
            } else {
                tambahPesan('Maaf, terjadi kesalahan saat memproses permintaan.', 'alina');
            }
        } catch (err) {
            chatArea.removeChild(chatArea.lastChild);
            tambahPesan('Tidak dapat terhubung ke server. Silakan coba lagi nanti.', 'alina');
            console.error(err);
        }
    });
</script>
</body>
</html>
