<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alina AI - Asisten Pintar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        alina: '#6366f1',
                        alinaDark: '#4f46e5',
                        sidebar: '#f8fafc',
                        sidebarDark: '#1e293b'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .scrollbar-thin::-webkit-scrollbar {
                width: 6px;
            }
            .scrollbar-thin::-webkit-scrollbar-track {
                background: transparent;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: #d1d5db;
                border-radius: 3px;
            }
            .dark .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: #4b5563;
            }
            /* Gaya format teks */
            .prose strong { font-weight: 700; }
            .prose em { font-style: italic; }
            .prose code {
                background: #f1f5f9;
                padding: 2px 6px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.9em;
            }
            .dark .prose code { background: #334155; }
            .prose pre {
                background: #f1f5f9;
                padding: 10px;
                border-radius: 6px;
                overflow-x: auto;
                margin: 8px 0;
            }
            .dark .prose pre { background: #334155; }
            .prose ul, .prose ol { padding-left: 20px; margin: 8px 0; }
            .prose blockquote {
                border-left: 3px solid #94a3b8;
                padding-left: 10px;
                color: #64748b;
                margin: 8px 0;
            }
            .dark .prose blockquote { border-color: #475569; color: #94a3b8; }
            /* Gaya untuk tampilan gambar */
            .prose img {
                max-width: 100%;
                height: auto;
                border-radius: 8px;
                margin: 10px 0;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                cursor: pointer;
                transition: transform 0.2s ease;
            }
            .prose img:hover {
                transform: scale(1.01);
            }
            /* Modal */
            .modal {
                background: rgba(0,0,0,0.6);
                display: none;
            }
            .modal.active {
                display: flex;
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-inter">

<div id="modalAkun" class="modal fixed inset-0 z-50 items-center justify-center">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-md p-6 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 id="judulModal" class="text-xl font-bold">Masuk ke Akun</h3>
            <button onclick="tutupModal()" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                <i class="fa fa-times"></i>
            </button>
        </div>

        <div id="formLogin">
            <div class="mb-3">
                <label class="block text-sm mb-1">Email</label>
                <input type="email" id="loginEmail" class="w-full px-3 py-2 border rounded bg-gray-50 dark:bg-gray-700 dark:border-gray-600" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm mb-1">Kata Sandi</label>
                <input type="password" id="loginSandi" class="w-full px-3 py-2 border rounded bg-gray-50 dark:bg-gray-700 dark:border-gray-600" required>
            </div>
            <button onclick="prosesLogin()" class="w-full bg-alina hover:bg-alinaDark text-white py-2 rounded mb-3">Masuk</button>
            <p class="text-center text-sm">Belum punya akun? <a href="#" onclick="tukarForm()" class="text-alina font-medium">Daftar di sini</a></p>
        </div>

        <div id="formDaftar" class="hidden">
            <div class="mb-3">
                <label class="block text-sm mb-1">Nama Lengkap</label>
                <input type="text" id="daftarNama" class="w-full px-3 py-2 border rounded bg-gray-50 dark:bg-gray-700 dark:border-gray-600" required>
            </div>
            <div class="mb-3">
                <label class="block text-sm mb-1">Email</label>
                <input type="email" id="daftarEmail" class="w-full px-3 py-2 border rounded bg-gray-50 dark:bg-gray-700 dark:border-gray-600" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm mb-1">Kata Sandi</label>
                <input type="password" id="daftarSandi" class="w-full px-3 py-2 border rounded bg-gray-50 dark:bg-gray-700 dark:border-gray-600" required>
            </div>
            <button onclick="prosesDaftar()" class="w-full bg-alina hover:bg-alinaDark text-white py-2 rounded mb-3">Buat Akun</button>
            <p class="text-center text-sm">Sudah punya akun? <a href="#" onclick="tukarForm()" class="text-alina font-medium">Masuk di sini</a></p>
        </div>
    </div>
</div>

<div id="app" class="flex h-screen max-w-7xl mx-auto shadow-lg">

    <aside class="w-72 bg-sidebar dark:bg-sidebarDark border-r border-gray-200 dark:border-gray-700 flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden">
                    <img src="/static/assets/logo.png" alt="Logo Alina" class="w-full h-full object-contain">
                </div>
                <h2 class="text-lg font-bold">Alina AI</h2>
            </div>

            <div id="infoPengguna" class="mb-4 text-sm text-gray-600 dark:text-gray-300 hidden">
                <p>Halo, <span id="namaPengguna"></span></p>
                <button onclick="keluarAkun()" class="text-red-500 text-xs mt-1 hover:underline">Keluar</button>
            </div>
            <button id="tombolMasuk" onclick="bukaModal()" class="w-full bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-white rounded-lg py-2 px-3 mb-4">
                <i class="fa fa-user mr-2"></i> Masuk / Daftar
            </button>

            <button id="obrolanBaru" class="w-full bg-alina hover:bg-alinaDark text-white rounded-lg py-2 px-3 flex items-center justify-center gap-2">
                <i class="fa fa-plus"></i> Obrolan Baru
            </button>
        </div>

        <div class="flex-1 p-3 overflow-y-auto scrollbar-thin">
            <h3 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Riwayat Obrolan</h3>
            <div id="daftarRiwayat" class="space-y-1">
                <div class="text-xs text-gray-400 text-center py-4">Masuk untuk melihat riwayat</div>
            </div>
        </div>

        <div class="p-3 border-t border-gray-200 dark:border-gray-700">
            <button id="modeToggle" class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                <span><i class="fa fa-moon-o dark:hidden mr-2"></i><i class="fa fa-sun-o hidden dark:inline mr-2"></i> Mode Gelap</span>
                <i class="fa fa-chevron-right text-xs"></i>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">AI-nya Orang Indonesia</h1>
        </header>

        <div id="chatArea" class="flex-1 p-4 overflow-y-auto scrollbar-thin space-y-4 bg-gray-50 dark:bg-gray-900">
            <div class="flex gap-3 max-w-[90%]">
                <div class="w-8 h-8 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden flex-shrink-0 mt-1">
                    <img src="/static/assets/karakter.png" alt="Alina" class="w-full h-full object-contain">
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm prose">
                    <p>Halo! Saya Alina AI. Ada yang bisa saya bantu hari ini?</p>
                </div>
            </div>
        </div>

        <form id="chatForm" class="p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
            <div class="flex gap-2">
                <input type="text" id="pesanInput" placeholder="Ketik pesan Anda..." required
                    class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-full bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-alina">
                <button type="submit" class="w-10 h-10 rounded-full bg-alina hover:bg-alinaDark text-white flex items-center justify-center">
                    <i class="fa fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </main>

</div>

<script>
    const API_DASAR = "/api";
    let percakapanAktifId = null;
    let penggunaSaatIni = null;

    const modeToggle = document.getElementById('modeToggle');
    if (localStorage.getItem('mode') === 'gelap' || 
        (!localStorage.getItem('mode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
    modeToggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('mode', document.documentElement.classList.contains('dark') ? 'gelap' : 'terang');
    });

    function bukaModal() {
        document.getElementById('modalAkun').classList.add('active');
    }
    function tutupModal() {
        document.getElementById('modalAkun').classList.remove('active');
    }
    function tukarForm() {
        const formLogin = document.getElementById('formLogin');
        const formDaftar = document.getElementById('formDaftar');
        const judul = document.getElementById('judulModal');
        if (formLogin.classList.contains('hidden')) {
            formLogin.classList.remove('hidden');
            formDaftar.classList.add('hidden');
            judul.textContent = "Masuk ke Akun";
        } else {
            formLogin.classList.add('hidden');
            formDaftar.classList.remove('hidden');
            judul.textContent = "Daftar Akun Baru";
        }
    }

    function prosesDaftar() {
        const nama = document.getElementById('daftarNama').value.trim();
        const email = document.getElementById('daftarEmail').value.trim().toLowerCase();
        const sandi = document.getElementById('daftarSandi').value.trim();
        if (!nama || !email || !sandi) return alert("Isi semua kolom!");

        const daftarPengguna = JSON.parse(localStorage.getItem('penggunaAkun')) || [];
        if (daftarPengguna.some(u => u.email === email)) return alert("Email sudah terdaftar!");

        const akunBaru = { id: Date.now().toString(), nama, email, sandi, riwayat: [] };
        daftarPengguna.push(akunBaru);
        localStorage.setItem('penggunaAkun', JSON.stringify(daftarPengguna));
        alert("Pendaftaran berhasil! Silakan masuk.");
        tukarForm();
    }

    function prosesLogin() {
        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const sandi = document.getElementById('loginSandi').value.trim();
        if (!email || !sandi) return alert("Isi email dan sandi!");

        const daftarPengguna = JSON.parse(localStorage.getItem('penggunaAkun')) || [];
        const ditemukan = daftarPengguna.find(u => u.email === email && u.sandi === sandi);
        if (!ditemukan) return alert("Email atau sandi salah!");

        penggunaSaatIni = ditemukan;
        localStorage.setItem('sesiPengguna', ditemukan.id);
        tampilkanInfoPengguna();
        tutupModal();
        renderRiwayat();
    }

    function keluarAkun() {
        if (!confirm("Yakin ingin keluar?")) return;
        penggunaSaatIni = null;
        localStorage.removeItem('sesiPengguna');
        document.getElementById('infoPengguna').classList.add('hidden');
        document.getElementById('tombolMasuk').classList.remove('hidden');
        document.getElementById('chatArea').innerHTML = `
            <div class="flex gap-3 max-w-[90%]">
                <div class="w-8 h-8 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden flex-shrink-0 mt-1">
                    <img src="/static/assets/karakter.png" alt="Alina" class="w-full h-full object-contain">
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm prose">
                    <p>Halo! Saya Alina AI. Silakan masuk atau daftar untuk menyimpan percakapan Anda.</p>
                </div>
            </div>
        `;
        document.getElementById('daftarRiwayat').innerHTML = `<div class="text-xs text-gray-400 text-center py-4">Masuk untuk melihat riwayat</div>`;
    }

    function tampilkanInfoPengguna() {
        document.getElementById('namaPengguna').textContent = penggunaSaatIni.nama;
        document.getElementById('infoPengguna').classList.remove('hidden');
        document.getElementById('tombolMasuk').classList.add('hidden');
    }

    function cekSesiAwal() {
        const sesiId = localStorage.getItem('sesiPengguna');
        if (!sesiId) return;
        const daftarPengguna = JSON.parse(localStorage.getItem('penggunaAkun')) || [];
        penggunaSaatIni = daftarPengguna.find(u => u.id === sesiId);
        if (penggunaSaatIni) {
            tampilkanInfoPengguna();
            renderRiwayat();
        }
    }

    function simpanPerubahanAkun() {
        const daftar = JSON.parse(localStorage.getItem('penggunaAkun')) || [];
        const index = daftar.findIndex(u => u.id === penggunaSaatIni.id);
        if (index !== -1) {
            daftar[index] = penggunaSaatIni;
            localStorage.setItem('penggunaAkun', JSON.stringify(daftar));
        }
    }

    function buatObrolanBaru(judul = "Obrolan Baru") {
        if (!penggunaSaatIni) return alert("Silakan masuk terlebih dahulu!");
        const id = Date.now().toString();
        const obrolan = {
            id, judul,
            pesan: [{ pengirim: "alina", teks: "Halo! Saya Alina AI. Ada yang bisa saya bantu hari ini?" }],
            dibuatPada: new Date().toISOString()
        };
        penggunaSaatIni.riwayat.unshift(obrolan);
        simpanPerubahanAkun();
        percakapanAktifId = id;
        renderRiwayat();
        tampilkanIsiObrolan(id);
    }

    function tampilkanIsiObrolan(id) {
        if (!penggunaSaatIni) return;
        const obrolan = penggunaSaatIni.riwayat.find(o => o.id === id);
        if (!obrolan) return;
        percakapanAktifId = id;
        chatArea.innerHTML = "";
        obrolan.pesan.forEach(item => tambahPesanKeLayar(item.teks, item.pengirim, false));
    }

    function simpanPesanKeObrolan(teks, pengirim) {
        if (!penggunaSaatIni) return;
        if (!percakapanAktifId) buatObrolanBaru();
        const index = penggunaSaatIni.riwayat.findIndex(o => o.id === percakapanAktifId);
        if (index === -1) return;
        penggunaSaatIni.riwayat[index].pesan.push({ pengirim, teks });
        if (penggunaSaatIni.riwayat[index].pesan.length === 2 && pengirim === "pengguna") {
            penggunaSaatIni.riwayat[index].judul = teks.slice(0, 25) + (teks.length > 25 ? "..." : "");
        }
        simpanPerubahanAkun();
        renderRiwayat();
    }

    function hapusObrolan(id) {
        if (!penggunaSaatIni || !confirm("Hapus obrolan ini?")) return;
        penggunaSaatIni.riwayat = penggunaSaatIni.riwayat.filter(o => o.id !== id);
        simpanPerubahanAkun();
        if (percakapanAktifId === id && penggunaSaatIni.riwayat.length > 0) {
            tampilkanIsiObrolan(penggunaSaatIni.riwayat[0].id);
        } else if (percakapanAktifId === id) {
            percakapanAktifId = null;
            chatArea.innerHTML = `<div class="flex gap-3 max-w-[90%]"><div class="w-8 h-8 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden flex-shrink-0 mt-1"><img src="/static/assets/karakter.png" alt="Alina" class="w-full h-full object-contain"></div><div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm prose"><p>Halo! Saya Alina AI. Ada yang bisa saya bantu hari ini?</p></div></div>`;
        }
        renderRiwayat();
    }

    function gantiNamaObrolan(id) {
        if (!penggunaSaatIni) return;
        const obrolan = penggunaSaatIni.riwayat.find(o => o.id === id);
        if (!obrolan) return;
        const namaBaru = prompt("Masukkan nama baru:", obrolan.judul);
        if (namaBaru && namaBaru.trim() !== "") {
            obrolan.judul = namaBaru.trim();
            simpanPerubahanAkun();
            renderRiwayat();
        }
    }

    function renderRiwayat() {
        const daftarEl = document.getElementById('daftarRiwayat');
        if (!penggunaSaatIni) {
            daftarEl.innerHTML = `<div class="text-xs text-gray-400 text-center py-4">Masuk untuk melihat riwayat</div>`;
            return;
        }
        daftarEl.innerHTML = "";
        if (penggunaSaatIni.riwayat.length === 0) {
            daftarEl.innerHTML = `<div class="text-xs text-gray-400 text-center py-4">Belum ada obrolan</div>`;
            return;
        }
        penggunaSaatIni.riwayat.forEach(obrolan => {
            const el = document.createElement('div');
            el.className = `p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer text-sm group flex justify-between items-center ${
                percakapanAktifId === obrolan.id ? 'bg-alina/10 text-alina dark:bg-alina/20' : 'bg-white dark:bg-gray-800'
            }`;
            el.innerHTML = `
                <span class="truncate flex-1" onclick="tampilkanIsiObrolan('${obrolan.id}')">
                    <i class="fa fa-comment-o mr-2"></i> ${obrolan.judul}
                </span>
                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="gantiNamaObrolan('${obrolan.id}')" class="text-gray-500 hover:text-alina px-1">
                        <i class="fa fa-pencil"></i>
                    </button>
                    <button onclick="hapusObrolan('${obrolan.id}')" class="text-gray-500 hover:text-red-500 px-1">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>
            `;
            daftarEl.appendChild(el);
        });
    }

    function formatTeksMarkdown(teks) {
        return teks
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/`(.*?)`/g, '<code>$1</code>')
            .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/!\[Gambar\]\((.*?)\)/g, '<img src="$1" alt="Gambar hasil buatan Alina" loading="lazy" onclick="window.open(this.src, \'_blank\')">')
            .replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" loading="lazy" onclick="window.open(this.src, \'_blank\')">')
            .replace(/🔗 (https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" class="text-alina hover:underline">🔗 Buka Sumber</a>')
            .replace(/^- (.*)$/gm, '<li>$1</li>')
            .replace(/(<li>.*<\/li>)/s, '<ul class="list-disc pl-5 my-2"></ul>$1')
            .replace(/^> (.*)$/gm, '<blockquote>$1</blockquote>')
            .replace(/\n/g, '<br>');
    }

    function tambahPesanKeLayar(teks, pengirim, simpan = true) {
        const div = document.createElement('div');
        div.className = `flex gap-3 max-w-[90%] ${pengirim === 'pengguna' ? 'ml-auto flex-row-reverse' : ''}`;
        
        if (pengirim === 'alina') {
            const teksTerformat = formatTeksMarkdown(teks);
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden flex-shrink-0 mt-1">
                    <img src="/static/assets/karakter.png" alt="Alina" class="w-full h-full object-contain">
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm prose max-w-none">
                    ${teksTerformat}
                </div>
            `;
        } else {
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-white flex-shrink-0 mt-1">
                    <i class="fa fa-user"></i>
                </div>
                <div class="bg-alina text-white rounded-2xl rounded-tr-none p-3 shadow-sm">
                    <p>${teks.replace(/\n/g, '<br>')}</p>
                </div>
            `;
        }

        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        if (simpan && penggunaSaatIni) simpanPesanKeObrolan(teks, pengirim);
    }

    const chatArea = document.getElementById('chatArea');
    const chatForm = document.getElementById('chatForm');
    const pesanInput = document.getElementById('pesanInput');
    const tombolObrolanBaru = document.getElementById('obrolanBaru');

    tombolObrolanBaru.addEventListener('click', () => {
        if (!penggunaSaatIni) return alert("Silakan masuk atau daftar terlebih dahulu!");
        buatObrolanBaru();
    });

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const teks = pesanInput.value.trim();
        if (!teks) return;
        if (!penggunaSaatIni) return alert("Silakan masuk atau daftar terlebih dahulu untuk mengirim pesan!");

        tambahPesanKeLayar(teks, 'pengguna');
        pesanInput.value = '';
    
        const statusEl = document.createElement('div');
        statusEl.className = `flex gap-3 max-w-[90%]`;
        statusEl.innerHTML = `
            <div class="w-8 h-8 rounded-full bg-white border border-gray-200 dark:border-gray-700 flex items-center justify-center overflow-hidden flex-shrink-0 mt-1">
                <img src="/static/assets/karakter.png" alt="Alina" class="w-full h-full object-contain">
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-none p-3 shadow-sm prose">
                <p>Sedang mengetik...</p>
            </div>
        `;
        chatArea.appendChild(statusEl);
        chatArea.scrollTop = chatArea.scrollHeight;

        try {
            const res = await fetch(`${API_DASAR}/tanya`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: teks })
            });
            if (chatArea.contains(statusEl)) chatArea.removeChild(statusEl);
        
            if (res.ok) {
                const data = await res.json();
                tambahPesanKeLayar(data.jawaban, 'alina');
            } else {
                tambahPesanKeLayar('Maaf, terjadi kesalahan saat memproses permintaan.', 'alina');
            }
        } catch (err) {
            if (chatArea.contains(statusEl)) chatArea.removeChild(statusEl);
            tambahPesanKeLayar('Tidak dapat terhubung ke server. Silakan coba lagi nanti.', 'alina');
            console.error(err);
        }
    });
    cekSesiAwal();
</script>
</body>
</html>
